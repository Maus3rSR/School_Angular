<div class="wishflix-shell">
  <header class="navbar wishflix-shell__navbar" aria-label="Navigation principale">
    <div class="navbar-start">
      <!-- Interpolation: affiche une valeur TypeScript directement dans le template. -->
      <!-- Angular synchronise automatiquement cette valeur quand l'etat du composant evolue. -->
      <!-- Dans WishFlix, le nom de marque reste coherent sans mise a jour DOM imperative. -->
      <!-- Pour aller plus loin: https://angular.dev/guide/templates/binding -->
      <p class="wishflix-shell__brand">{{ nomApplication }}</p>
      <span class="wishflix-shell__tagline">Gaming</span>
    </div>

    <div class="navbar-end"></div>
  </header>

  <main class="wishflix-main" id="contenu-principal">
    <router-outlet />
  </main>

  <footer class="wishflix-footer" aria-label="Pied de page">
    <p class="wishflix-footer__text">WishFlix</p>
  </footer>
</div>
