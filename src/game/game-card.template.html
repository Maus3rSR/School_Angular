<article class="card movie-card game-card">
  <figure class="game-card__cover">
    <!-- ngSrc active NgOptimizedImage pour optimiser le chargement des affiches. -->
    <!-- Angular utilise les dimensions connues pour limiter les decalages visuels (CLS). -->
    <!-- Dans WishFlix, la grille reste stable et lisible meme quand beaucoup d'images arrivent. -->
    <!-- Pour aller plus loin: https://angular.dev/guide/image-optimization -->
    <img [ngSrc]="game().image" [alt]="game().title" width="300" height="450" loading="lazy" />
  </figure>
  <div class="card-body game-card__body">
    <div class="game-card__badges">
      <span class="badge badge-secondary">{{ game().category }}</span>
      <span class="badge badge-ghost">{{ game().genre }}</span>
    </div>

    <h3 class="card-title game-card__title">{{ game().title }}</h3>
    <p class="game-card__meta">{{ game().year }} - {{ game().platform }}</p>
    <div class="game-card__rating">
      <span class="game-card__rating-value">{{ game().rating }}</span>
      <span class="game-card__rating-max">/5</span>
    </div>
    <p class="game-card__synopsis">
      {{ game().synopsis }}
    </p>

    <div class="card-actions game-card__actions">
      <!-- Class binding [class]: applique un style selon l'etat disponible/indisponible. -->
      <!-- Angular recalcule seulement les classes necessaires, sans logique imperative manuelle. -->
      <!-- Dans WishFlix, l'utilisateur identifie d'un coup d'oeil les jeux jouables. -->
      <!-- Pour aller plus loin: https://angular.dev/guide/templates/binding#css-class-and-style-property-bindings -->
      <span
        [class]="{
          'badge-success': game().available,
          'badge-error': !game().available,
        }"
        class="badge"
      >
        <!-- Control flow @if/@else: rend un libelle different selon game().available. -->
        <!-- Le template reste declaratif et la condition est lue directement dans la vue. -->
        <!-- Dans WishFlix, cela evite une ambiguite UX sur la disponibilite des titres. -->
        <!-- Pour aller plus loin: https://angular.dev/guide/templates/control-flow -->
        @if (game().available) {
          Disponible
        } @else {
          Indisponible :-(
        }
      </span>

      <!-- Event binding: emet l'id du jeu vers le parent via l'output favorite. -->
      <!-- L'enfant exprime une intention, puis App decide la mise a jour de la wishlist. -->
      <!-- Dans WishFlix, ce flux protege la coherence de l'etat global des favoris. -->
      <!-- Pour aller plus loin: https://angular.dev/guide/components/outputs -->
      <flix-button type="outline" size="sm" (click)="favorite.emit(game().id)">
        {{ wishlistLabel }}
      </flix-button>
    </div>
  </div>
</article>
